name: Nightly

on:
  workflow_call:
    inputs:
      rust-version:
        type: string
        default: stable
        description: Rust toolchain (e.g. stable, nightly, 1.75.0)
      toolchain-components:
        type: string
        default: rustfmt,clippy
        description: Rust components to install
      test-flags:
        type: string
        default: --all-features --workspace
        description: cargo test flags
      build-flags:
        type: string
        default: --release --all-features --workspace
        description: cargo build flags
      run-benchmarks:
        type: boolean
        default: false
        description: Run benchmarks
      create-release:
        type: boolean
        default: false
        description: Create draft release
      release-tag:
        type: string
        default: nightly
        description: Release tag prefix
      codecov-token:
        type: string
        required: false
        description: Codecov token

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10

jobs:
  nightly:
    name: nightly-checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libsqlite3-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: ${{ inputs.toolchain-components }}

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Run tests
      run: cargo test ${{ inputs.test-flags }} --verbose
      env:
        RUST_LOG: debug

    - name: Build release
      run: cargo build ${{ inputs.build-flags }} --verbose

    - name: Create draft release
      if: inputs.create-release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        name: ${{ inputs.release-tag }}-${{ github.sha }}
        tag_name: ${{ inputs.release-tag }}-${{ github.sha }}
        files: |
          target/release/harper
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Run benchmarks
      if: inputs.run-benchmarks
      run: cargo bench --all-features --workspace

    - name: Upload coverage
      if: inputs.codecov-token != ''
      uses: codecov/codecov-action@v4
      with:
        token: ${{ inputs.codecov-token }}
